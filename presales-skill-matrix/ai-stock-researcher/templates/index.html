<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 股票研究员 — 智能投研仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#111;--border:#1a1a1a;--accent:#ff5a1f;--accent2:#ff8c42;
--text:#f5f1eb;--text2:#888;--green:#22c55e;--red:#ef4444;--up:#ef4444;--down:#22c55e}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Header */
.header{background:#0f0f0f;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.3rem;font-weight:900}
.header h1 span:first-child{color:var(--accent)}
.header h1 span:last-child{color:var(--text)}
.header .subtitle{color:var(--text2);font-size:.8rem;margin-left:12px}

/* Tabs */
.tabs{display:flex;gap:0;background:#0f0f0f;border-bottom:1px solid var(--border);padding:0 24px}
.tab{padding:10px 20px;cursor:pointer;color:var(--text2);font-size:.9rem;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* Content */
.content{padding:20px 24px;max-width:1400px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.card .label{color:var(--text2);font-size:.75rem;margin-bottom:4px}
.card .value{font-size:1.4rem;font-weight:700}
.card .change{font-size:.85rem;margin-top:4px}
.up{color:var(--up)}.down{color:var(--down)}

/* Search */
.search-box{display:flex;gap:8px;margin-bottom:20px}
.search-box input{flex:1;background:#161616;border:1px solid #2a2a2a;border-radius:8px;padding:10px 14px;color:var(--text);font-size:.9rem;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box button,.btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;padding:10px 20px;color:#fff;font-weight:600;cursor:pointer;font-size:.9rem;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(255,90,31,.3)}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}

/* Table */
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:.85rem}
th{color:var(--text2);font-weight:600;font-size:.75rem;text-transform:uppercase}

/* Chart containers */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;min-height:350px}
.chart-box h3{font-size:.9rem;margin-bottom:12px;color:var(--text2)}
.chart{width:100%;height:320px}

/* Agent progress */
.agent-progress{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
.progress-bar{height:6px;background:#222;border-radius:3px;overflow:hidden;margin:12px 0}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s;border-radius:3px}
.stages{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:16px}
.stage{padding:8px 12px;border-radius:6px;font-size:.78rem;background:#161616;border:1px solid var(--border);display:flex;align-items:center;gap:6px}
.stage.done{border-color:var(--green);color:var(--green)}
.stage.active{border-color:var(--accent);color:var(--accent);animation:pulse 1.5s infinite}
.stage.pending{color:var(--text2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Report sections */
.report-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.report-section h3{font-size:1rem;margin-bottom:12px;color:var(--accent)}
.report-section .content-text{font-size:.85rem;line-height:1.7;white-space:pre-wrap;color:var(--text)}

/* Signal card */
.signal-card{text-align:center;padding:30px;background:var(--card);border-radius:12px;border:2px solid var(--border);margin-bottom:20px}
.signal-card .signal{font-size:2.5rem;font-weight:900;margin:10px 0}
.signal-card .signal.BUY{color:var(--green)}
.signal-card .signal.SELL{color:var(--red)}
.signal-card .signal.HOLD{color:var(--accent)}

/* LLM config */
.llm-config{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.llm-config label{color:var(--text2);font-size:.8rem}
.llm-config select,.llm-config input[type=date]{background:#161616;border:1px solid #2a2a2a;border-radius:6px;padding:6px 10px;color:var(--text);font-size:.8rem;outline:none}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text2)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:768px){.chart-row{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <h1><span>AI Stock</span><span> Researcher</span></h1>
  <span class="subtitle">A股智能投研仪表盘 — 多智能体分析</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="market">市场概览</div>
  <div class="tab" data-tab="stock">股票分析</div>
  <div class="tab" data-tab="agent">多智能体研究</div>
  <div class="tab" data-tab="sector">板块分析</div>
</div>

<div class="content">
  <!-- ========== 市场概览 ========== -->
  <div class="panel active" id="panel-market">
    <div class="cards" id="index-cards"></div>
    <div class="chart-row">
      <div class="chart-box"><h3>上证指数走势</h3><div class="chart" id="chart-sh"></div></div>
      <div class="chart-box"><h3>创业板指走势</h3><div class="chart" id="chart-cy"></div></div>
    </div>
  </div>

  <!-- ========== 股票分析 ========== -->
  <div class="panel" id="panel-stock">
    <div class="search-box">
      <input id="stock-code" placeholder="输入6位股票代码，如 600519" maxlength="6">
      <button onclick="loadStock()">查询分析</button>
    </div>
    <div id="stock-result"></div>
  </div>

  <!-- ========== 多智能体研究 ========== -->
  <div class="panel" id="panel-agent">
    <div class="llm-config">
      <label>LLM提供商</label>
      <select id="llm-provider">
        <option value="deepseek">DeepSeek</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="qwen">通义千问</option>
        <option value="google">Google</option>
      </select>
      <label>快速模型</label>
      <input id="quick-model" value="deepseek-chat" style="width:160px;background:#161616;border:1px solid #2a2a2a;border-radius:6px;padding:6px 10px;color:var(--text);font-size:.8rem">
      <label>深度模型</label>
      <input id="deep-model" value="deepseek-chat" style="width:160px;background:#161616;border:1px solid #2a2a2a;border-radius:6px;padding:6px 10px;color:var(--text);font-size:.8rem">
      <label>分析日期</label>
      <input type="date" id="agent-date">
    </div>
    <div class="search-box">
      <input id="agent-ticker" placeholder="输入股票代码或名称，如 贵州茅台 或 600519">
      <button onclick="startAgentAnalysis()">启动多智能体分析</button>
    </div>
    <div id="agent-result"></div>
  </div>

  <!-- ========== 板块分析 ========== -->
  <div class="panel" id="panel-sector">
    <h3 style="margin-bottom:16px;color:var(--text2)">申万行业板块强弱排行</h3>
    <button class="btn btn-sm" onclick="loadSectors()" style="margin-bottom:16px">刷新板块数据</button>
    <div id="sector-result"></div>
  </div>
</div>

<script>
const API = '';
// ========== Tab Switching ==========
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
  });
});

// Set default date
document.getElementById('agent-date').valueAsDate = new Date();

// ========== Market Overview ==========
async function loadMarket() {
  try {
    const res = await fetch(API + '/api/market/overview');
    const data = await res.json();
    const cards = document.getElementById('index-cards');
    cards.innerHTML = data.map(d => {
      const cls = d.change_pct > 0 ? 'up' : d.change_pct < 0 ? 'down' : '';
      const sign = d.change_pct > 0 ? '+' : '';
      return `<div class="card">
        <div class="label">${d.display_name || d.name}</div>
        <div class="value ${cls}">${d.price ? d.price.toFixed(2) : '-'}</div>
        <div class="change ${cls}">${sign}${d.change_pct || 0}%</div>
      </div>`;
    }).join('');

    // Load charts
    loadIndexChart('sh', 'sh000001', 'chart-sh');
    loadIndexChart('cy', 'sz399006', 'chart-cy');
  } catch(e) { console.error(e); }
}

async function loadIndexChart(_, code, elId) {
  try {
    const res = await fetch(API + `/api/market/kline?code=${code}&count=60`);
    const data = await res.json();
    if (!data.length) return;
    const chart = echarts.init(document.getElementById(elId));
    chart.setOption({
      tooltip: { trigger: 'axis' },
      grid: { left: 60, right: 20, top: 20, bottom: 30 },
      xAxis: { type: 'category', data: data.map(d => d.date), axisLine: { lineStyle: { color: '#333' } }, axisLabel: { color: '#888', fontSize: 10 } },
      yAxis: { type: 'value', scale: true, axisLine: { lineStyle: { color: '#333' } }, splitLine: { lineStyle: { color: '#1a1a1a' } }, axisLabel: { color: '#888' } },
      series: [{
        type: 'line', data: data.map(d => d.close), smooth: true,
        lineStyle: { color: '#ff5a1f', width: 2 },
        areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(255,90,31,.3)' }, { offset: 1, color: 'rgba(255,90,31,0)' }]) },
        itemStyle: { color: '#ff5a1f' }
      }]
    });
    window.addEventListener('resize', () => chart.resize());
  } catch(e) { console.error(e); }
}

// ========== Stock Analysis ==========
async function loadStock() {
  const code = document.getElementById('stock-code').value.trim();
  if (!code || code.length !== 6) { alert('请输入6位股票代码'); return; }
  const el = document.getElementById('stock-result');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">正在分析...</p></div>';

  try {
    const [quoteRes, klineRes, techRes] = await Promise.all([
      fetch(API + `/api/stock/quote?code=${code}`),
      fetch(API + `/api/stock/kline?code=${code}&count=120`),
      fetch(API + `/api/stock/technical?code=${code}`)
    ]);
    const quote = await quoteRes.json();
    const kline = await klineRes.json();
    const tech = await techRes.json();

    if (quote.error) { el.innerHTML = `<div class="card" style="color:var(--red)">${quote.error}</div>`; return; }

    const cls = quote.change_pct > 0 ? 'up' : 'down';
    const sign = quote.change_pct > 0 ? '+' : '';

    el.innerHTML = `
      <div class="cards">
        <div class="card"><div class="label">股票</div><div class="value">${quote.name}</div><div class="change">${code}</div></div>
        <div class="card"><div class="label">现价</div><div class="value ${cls}">${quote.price}</div><div class="change ${cls}">${sign}${quote.change_pct}%</div></div>
        <div class="card"><div class="label">PE(市盈率)</div><div class="value">${quote.pe || '-'}</div></div>
        <div class="card"><div class="label">PB(市净率)</div><div class="value">${quote.pb || '-'}</div></div>
        <div class="card"><div class="label">MA5</div><div class="value">${tech.ma5 || '-'}</div></div>
        <div class="card"><div class="label">MA20</div><div class="value">${tech.ma20 || '-'}</div></div>
        <div class="card"><div class="label">RSI(14)</div><div class="value">${tech.rsi14 || '-'}</div></div>
        <div class="card"><div class="label">MACD</div><div class="value">${tech.macd_hist || '-'}</div></div>
      </div>
      <div class="chart-row">
        <div class="chart-box"><h3>K线走势</h3><div class="chart" id="stock-kline-chart"></div></div>
        <div class="chart-box"><h3>技术指标</h3><div class="chart" id="stock-tech-chart"></div></div>
      </div>`;

    // K-line chart
    if (kline.length) {
      const c = echarts.init(document.getElementById('stock-kline-chart'));
      c.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: 60, right: 20, top: 20, bottom: 30 },
        xAxis: { type: 'category', data: kline.map(d => d.date), axisLabel: { color: '#888', fontSize: 10 } },
        yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: '#1a1a1a' } }, axisLabel: { color: '#888' } },
        series: [
          { type: 'line', data: kline.map(d => d.close), smooth: true, lineStyle: { color: '#ff5a1f', width: 2 }, itemStyle: { color: '#ff5a1f' }, name: '收盘价' },
          { type: 'line', data: kline.map(() => tech.ma5), lineStyle: { color: '#3b82f6', width: 1, type: 'dashed' }, itemStyle: { color: '#3b82f6' }, symbol: 'none', name: 'MA5' },
          { type: 'line', data: kline.map(() => tech.ma20), lineStyle: { color: '#a855f7', width: 1, type: 'dashed' }, itemStyle: { color: '#a855f7' }, symbol: 'none', name: 'MA20' },
        ]
      });
      window.addEventListener('resize', () => c.resize());
    }

    // Technical chart
    if (tech.dif !== null && tech.dif !== undefined) {
      const c2 = echarts.init(document.getElementById('stock-tech-chart'));
      c2.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: 60, right: 20, top: 20, bottom: 30 },
        xAxis: { type: 'category', data: ['DIF', 'DEA', 'MACD柱', 'RSI6', 'RSI14'] },
        yAxis: { type: 'value', splitLine: { lineStyle: { color: '#1a1a1a' } }, axisLabel: { color: '#888' } },
        series: [{
          type: 'bar',
          data: [tech.dif, tech.dea, tech.macd_hist, tech.rsi6 - 50, tech.rsi14 - 50],
          itemStyle: {
            color: function(p) {
              return p.value >= 0 ? '#ef4444' : '#22c55e';
            }
          }
        }]
      });
      window.addEventListener('resize', () => c2.resize());
    }
  } catch(e) {
    el.innerHTML = `<div class="card" style="color:var(--red)">分析失败: ${e.message}</div>`;
  }
}

// ========== Multi-Agent Analysis ==========
let currentAgentId = null;
let evtSource = null;

async function startAgentAnalysis() {
  const ticker = document.getElementById('agent-ticker').value.trim();
  if (!ticker) { alert('请输入股票代码或名称'); return; }

  const el = document.getElementById('agent-result');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">正在启动多智能体分析...</p></div>';

  const body = {
    ticker: ticker,
    trade_date: document.getElementById('agent-date').value,
    llm_provider: document.getElementById('llm-provider').value,
    quick_model: document.getElementById('quick-model').value,
    deep_model: document.getElementById('deep-model').value,
  };

  try {
    const res = await fetch(API + '/api/agent/analyze', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.error) { el.innerHTML = `<div class="card" style="color:var(--red)">${data.error}</div>`; return; }

    currentAgentId = data.analysis_id;
    // Start SSE polling
    pollAgentStatus(data.analysis_id);
  } catch(e) {
    el.innerHTML = `<div class="card" style="color:var(--red)">启动失败: ${e.message}</div>`;
  }
}

function pollAgentStatus(aid) {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(API + `/api/agent/stream/${aid}`);
  evtSource.onmessage = function(e) {
    const data = JSON.parse(e.data);
    if (data.error) {
      document.getElementById('agent-result').innerHTML = `<div class="card" style="color:var(--red)">${data.error}</div>`;
      evtSource.close();
      return;
    }
    renderAgentProgress(data);
    if (data.status === 'complete' || data.status === 'error') {
      evtSource.close();
      if (data.status === 'complete') renderAgentReport(data);
    }
  };
  evtSource.onerror = function() {
    evtSource.close();
    // Fallback to polling
    setTimeout(() => pollAgentStatusFallback(aid), 2000);
  };
}

function pollAgentStatusFallback(aid) {
  fetch(API + `/api/agent/status?id=${aid}`).then(r => r.json()).then(data => {
    renderAgentProgress(data);
    if (data.status === 'complete') { renderAgentReport(data); }
    else if (data.status === 'error') {
      document.getElementById('agent-result').innerHTML = `<div class="card" style="color:var(--red)">分析失败: ${data.error}</div>`;
    }
    else { setTimeout(() => pollAgentStatusFallback(aid), 3000); }
  }).catch(() => setTimeout(() => pollAgentStatusFallback(aid), 3000));
}

const agentStages = [
  '市场分析师', '社交情绪分析师', '新闻分析师', '基本面分析师',
  '政策分析师', '资金流向追踪', '限售解禁监控', '质量门控',
  '多空辩论', '研究员决策', '交易员计划', '风险辩论', '最终决策'
];

function renderAgentProgress(data) {
  const progress = data.progress || 0;
  const stage = data.stage || '';
  const doneIdx = agentStages.indexOf(stage);

  document.getElementById('agent-result').innerHTML = `
    <div class="agent-progress">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong style="color:var(--accent)">多智能体分析中</strong>
        <span style="color:var(--text2);font-size:.8rem">${data.elapsed || 0}s | ${stage}</span>
      </div>
      <div class="progress-bar"><div class="fill" style="width:${progress}%"></div></div>
      <div style="text-align:center;color:var(--text2);font-size:.8rem;margin-bottom:12px">${progress}%</div>
      <div class="stages">
        ${agentStages.map((s, i) => {
          let cls = 'pending';
          if (i < doneIdx) cls = 'done';
          else if (s === stage) cls = 'active';
          return `<div class="stage ${cls}">${cls === 'done' ? '✓' : cls === 'active' ? '▶' : '○'} ${s}</div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderAgentReport(data) {
  const reportNames = {
    market_report: '市场分析师报告',
    sentiment_report: '社交情绪报告',
    news_report: '新闻分析师报告',
    fundamentals_report: '基本面分析报告',
    policy_report: '政策分析报告',
    hot_money_report: '资金流向报告',
    lockup_report: '限售解禁报告',
  };

  let signalClass = 'HOLD';
  if (data.signal) {
    const s = data.signal.toUpperCase();
    if (s.includes('BUY') || s.includes('买入')) signalClass = 'BUY';
    else if (s.includes('SELL') || s.includes('卖出')) signalClass = 'SELL';
  }

  let html = `
    <div class="signal-card">
      <div style="color:var(--text2)">最终交易信号</div>
      <div class="signal ${signalClass}">${data.signal || 'HOLD'}</div>
      <div style="color:var(--text2);font-size:.85rem">分析耗时: ${data.elapsed || '-'}秒</div>
    </div>`;

  if (data.final_decision) {
    html += `<div class="report-section"><h3>最终决策</h3><div class="content-text">${escHtml(data.final_decision)}</div></div>`;
  }

  // Analyst reports
  const reports = data.reports || {};
  for (const [key, label] of Object.entries(reportNames)) {
    const content = reports[key];
    if (content) {
      html += `<div class="report-section"><h3>${label}</h3><div class="content-text">${escHtml(content)}</div></div>`;
    }
  }

  // Debate
  if (data.bull_history || data.bear_history) {
    html += `<div class="report-section"><h3>多空辩论</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div><h4 style="color:var(--up);margin-bottom:8px">多方观点</h4><div class="content-text">${escHtml(data.bull_history)}</div></div>
        <div><h4 style="color:var(--down);margin-bottom:8px">空方观点</h4><div class="content-text">${escHtml(data.bear_history)}</div></div>
      </div>`;
    if (data.judge_decision) {
      html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><h4 style="color:var(--accent);margin-bottom:8px">研究员裁决</h4><div class="content-text">${escHtml(data.judge_decision)}</div></div>`;
    }
    html += `</div>`;
  }

  // Risk debate
  if (data.risk_aggressive || data.risk_conservative) {
    html += `<div class="report-section"><h3>风险辩论</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div><h4 style="color:var(--up);margin-bottom:8px">激进派</h4><div class="content-text">${escHtml(data.risk_aggressive)}</div></div>
        <div><h4 style="color:var(--down);margin-bottom:8px">保守派</h4><div class="content-text">${escHtml(data.risk_conservative)}</div></div>
        <div><h4 style="color:var(--text2);margin-bottom:8px">中立派</h4><div class="content-text">${escHtml(data.risk_neutral || '')}</div></div>
      </div>`;
    if (data.risk_decision) {
      html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><h4 style="color:var(--accent);margin-bottom:8px">风控裁决</h4><div class="content-text">${escHtml(data.risk_decision)}</div></div>`;
    }
    html += `</div>`;
  }

  document.getElementById('agent-result').innerHTML = html;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ========== Sector Analysis ==========
async function loadSectors() {
  const el = document.getElementById('sector-result');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">加载板块数据...</p></div>';
  try {
    const res = await fetch(API + '/api/sector/ranking');
    const data = await res.json();
    if (data.error) { el.innerHTML = `<div class="card" style="color:var(--red)">${data.error}</div>`; return; }

    el.innerHTML = `<table>
      <thead><tr><th>#</th><th>板块</th><th>平均涨跌</th><th>上涨/下跌</th><th>资金净流入(万)</th><th>信号</th></tr></thead>
      <tbody>${data.map((d, i) => {
        const cls = d.avg_change_pct > 0 ? 'up' : 'down';
        return `<tr>
          <td>${i+1}</td><td>${d.name}</td>
          <td class="${cls}">${d.avg_change_pct > 0 ? '+' : ''}${d.avg_change_pct.toFixed(2)}%</td>
          <td>${d.up_count}/${d.down_count}</td>
          <td class="${d.total_net_flow > 0 ? 'up' : 'down'}">${d.total_net_flow > 0 ? '+' : ''}${d.total_net_flow.toFixed(2)}</td>
          <td>${d.signal}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  } catch(e) {
    el.innerHTML = `<div class="card" style="color:var(--red)">加载失败: ${e.message}</div>`;
  }
}

// ========== Init ==========
loadMarket();
</script>
